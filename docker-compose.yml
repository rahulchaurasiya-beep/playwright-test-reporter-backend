services:
  postgres:
    image: postgres:16-alpine
    container_name: playwright-reporter-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rocketium_e2e_runs
    ports:
      - "5432:5432"
    volumes:
      - reporter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rocketium_e2e_runs"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  reporter_pgdata:
